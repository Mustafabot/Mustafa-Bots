on:
  schedule:
    - cron: "14 17 * * *" # 01:14 CST
  workflow_dispatch:
    inputs:
      task:
        description: "Select the task to run"
        type: choice
        required: true
        options:
          - AutoPatrol

env:
  MOEGIRL_ZH_SSO_TOKEN: ${{ secrets.MOEGIRL_ZH_SSO_TOKEN }}
  MOEGIRL_CM_SSO_TOKEN: ${{ secrets.MOEGIRL_CM_SSO_TOKEN }}
  MOEGIRL_CLIENT_USERNAME: ${{ secrets.MOEGIRL_CLIENT_USERNAME }}
  MOEGIRL_CLIENT_PASSWORD: ${{ secrets.MOEGIRL_CLIENT_PASSWORD }}
  MOEGIRL_SSO_USER_ID: ${{ secrets.MOEGIRL_SSO_USER_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  AutoPatrol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Script
        run: npx tsx src/patrol/AutoPatrol.ts --verbose
